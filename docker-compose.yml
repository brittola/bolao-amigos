services:
  db:
    image: postgres:15-alpine
    container_name: bolao-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao
      POSTGRES_DB: bolao
    ports:
      - "5432:5432"
    volumes:
      - bolao-pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bolao-pgdata:
